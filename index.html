<html lang="ko">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');

  :root {
    --bg: #D0D0D0;
    --surface: #1a1a1a;
    --border: #333333;
    --accent: #ffffff;
    --accent2: #eeeeee;
    --text: #111111;
    --muted: #444444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* 노이즈 오버레이 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* 다이얼로그 */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }

  #dialog {
    background: #1a1a1a;
    border: 1px solid #333;
    border-top: 3px solid var(--accent);
    padding: 48px 40px 40px;
    width: 480px; max-width: 90vw;
    animation: dialogIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes dialogIn {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .dialog-label {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 13px; letter-spacing: 0.2em;
    color: #ffffff; text-transform: uppercase; margin-bottom: 16px;
  }

  #dialog h2 {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400; font-size: 26px; line-height: 1.3;
    color: #f0ece4; margin-bottom: 32px;
  }

  #dialog h2 span { color: #D23232; }

  #target-input {
    width: 100%; background: #0a0a0a;
    border: 1px solid #333;
    border-bottom: 2px solid #ffffff;
    color: #f0ece4;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px; font-weight: 400;
    padding: 14px 16px; outline: none;
    transition: border-color 0.2s;
    caret-color: #ffffff;
  }
  #target-input::placeholder { color: #666; }
  #target-input:focus { border-bottom-color: #cccccc; background: #141414; }

  #start-btn {
    margin-top: 20px; width: 100%;
    background: var(--accent); border: none; color: #000;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px; letter-spacing: 0.1em; padding: 16px;
    cursor: pointer; position: relative; overflow: hidden;
    transition: background 0.2s, transform 0.1s;
  }
  #start-btn:hover { background: #AC2121; }
  #start-btn:active { transform: scale(0.98); }
  #start-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%); transition: transform 0.4s;
  }
  #start-btn:hover::after { transform: translateX(100%); }

  #page-wrap {
    max-width: 1200px;
    width: 100%;
    height: 100vh;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    display: none;
  }

  /* 메인 씬 */
  #scene {
    width: 100%; height: 100%;
    position: relative; display: none;
  }

  /* 캔버스 (새총 줄) */
  #sling-canvas {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 5;
  }

  /* 타겟 존 (히트박스 + 이펙트 범위) */
  #target-zone {
    position: absolute; top: 36%; left: 50%;
    transform: translate(-50%, -50%);
    padding: 36px;
    z-index: 10;
    pointer-events: none;
    animation: float 3s ease-in-out infinite;
  }

  /* 타겟 텍스트 */
  #target-text {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(36px, 8vw, 100px);
    color: #111111;
    white-space: nowrap;
    text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    letter-spacing: 0.02em;
  }

  @keyframes float {
    0%,100% { transform: translate(-50%, -50%); }
    50%      { transform: translate(-50%, calc(-50% - 18px)); }
  }

  /* 고릴라 래퍼 */
  #gorilla-wrap {
    position: absolute;
    width: 360px; height: 360px;
    z-index: 20;
    cursor: grab;
    touch-action: none;
  }
  #gorilla-wrap:active { cursor: grabbing; }
  #gorilla-body-svg {
    width: 100%; height: 100%;
    pointer-events: none;
    display: block;
  }
  /* 비행 중 흔들림 */
  @keyframes flyWiggle {
    0%   { transform: scaleX(1)   skewY(0deg)  scaleY(1);   }
    20%  { transform: scaleX(1.15) skewY(-12deg) scaleY(0.9); }
    40%  { transform: scaleX(0.9) skewY(10deg)  scaleY(1.1); }
    60%  { transform: scaleX(1.1) skewY(-8deg)  scaleY(0.95);}
    80%  { transform: scaleX(0.95) skewY(6deg)  scaleY(1.05);}
    100% { transform: scaleX(1)   skewY(0deg)  scaleY(1);   }
  }
  #gorilla-wrap.launched #gorilla-body-svg {
    animation: flyWiggle 0.25s linear infinite;
    transform-origin: center center;
  }

  /* 드래그 중 당겨진 느낌 */
  #gorilla-wrap.dragging {
    filter: drop-shadow(0 0 16px rgba(0,0,0,0.6));
  }

  /* 발사 중 (JS로 위치 제어) */
  #gorilla-wrap.launched {
    cursor: default;
    pointer-events: none;
  }

  /* 발사 전 텍스트 오버레이 */
  #punch-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200; pointer-events: none;
    opacity: 0;
  }
  #punch-overlay.show {
    opacity: 1;
    animation: overlayDissolve 1s ease-out forwards;
  }
  @keyframes overlayDissolve {
    0%   { opacity: 0.5; }
    60%  { opacity: 0.5; }
    100% { opacity: 0; }
  }
  #punch-overlay-text {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(36px, 7vw, 100px);
    color: #ffffff;
    text-align: center;
    line-height: 1.25;
    text-shadow: 0 2px 20px rgba(0,0,0,0.15);
    animation: punchTextPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  #punch-overlay-text .target-name {
    display: block;
    color: #ffffff;
  }
  @keyframes punchTextPop {
    from { transform: scale(0.8); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* 폭발 이펙트 SVG 래퍼 */
  .impact-shape {
    position: absolute;
    pointer-events: none;
    z-index: 50;
    transform: translate(-50%, -50%);
    animation: impactShapeAnim 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes impactShapeAnim {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.2) rotate(var(--rot-start)); }
    40%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15) rotate(var(--rot-mid)); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.9) rotate(var(--rot-end)); }
  }

  /* 충격파 */
  .shockwave {
    position: absolute; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.9);
    pointer-events: none; z-index: 40;
    animation: shockwaveAnim 0.7s ease-out forwards;
    transform: translate(-50%, -50%);
  }
  @keyframes shockwaveAnim {
    0%   { width: 10px; height: 10px; opacity: 1; }
    100% { width: 260px; height: 260px; opacity: 0; }
  }

  /* 텍스트 흔들림 */
  #target-zone.shake {
    animation: shake 0.45s ease-out, floatZone 3s ease-in-out 0.45s infinite !important;
  }
  @keyframes floatZone {
    0%,100% { transform: translate(-50%, -50%); }
    50%      { transform: translate(-50%, calc(-50% - 18px)); }
  }
  @keyframes shake {
    0%,100% { transform: translate(-50%,-50%); }
    15%  { transform: translate(calc(-50% + 16px), calc(-50% - 8px)) rotate(4deg); }
    30%  { transform: translate(calc(-50% - 12px), calc(-50% + 5px)) rotate(-3deg); }
    50%  { transform: translate(calc(-50% + 9px), calc(-50% - 4px)) rotate(2deg); }
    70%  { transform: translate(calc(-50% - 6px), calc(-50% + 2px)) rotate(-1deg); }
  }

  /* 파티클 */
  .particle {
    position: absolute; border-radius: 50%; pointer-events: none; z-index: 45;
  }
  /* 힌트 */
  #hint {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 0.15em; color: #333;
    pointer-events: none; white-space: nowrap;
    animation: hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%,100% { opacity: 0.5; } 50% { opacity: 1; }
  }

  @keyframes particleAnim {
    to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  #reset-btn {
    position: absolute; top: 24px; left: 28px;
    background: none; border: none; color: #333;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px; letter-spacing: 0.1em; padding: 0;
    cursor: pointer; z-index: 100; transition: color 0.2s; display: none;
  }
  #reset-btn:hover { color: #111; }

  /* 펀치 카운트 */
  #kill-count {
    position: absolute; top: 24px; right: 28px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px; letter-spacing: 0.15em; color: #333; z-index: 100;
  }
  #kill-count span { color: #111; font-size: 20px; display: inline; }
</style>

<!-- 다이얼로그 -->
<div id="overlay">
  <div id="dialog">
    <div class="dialog-label">KING KONG PUNCH</div>
    <h2>어디로<br><span>킹콩 펀치</span>를<br>날리시겠어요?</h2>
    <input id="target-input" type="text" placeholder="대상을 입력하세요" maxlength="20" autocomplete="off"/>
    <button id="start-btn" onclick="startGame()">🦍 날린다</button>
  </div>
</div>

<!-- 메인 씬 -->
<div id="page-wrap">
  <div id="scene">
    <canvas id="sling-canvas"></canvas>
    <div id="target-zone"><div id="target-text"></div></div>
    <div id="punch-overlay"><div id="punch-overlay-text"></div></div>
    <div id="gorilla-wrap"></div>
    <button id="reset-btn" onclick="resetGame()">다시하기</button>
    <div id="kill-count">펀치 횟수<span id="count">0</span></div>
    <div id="hint">고릴라를 당겨서 놓으세요 🦍</div>
  </div>
</div>

<script>
  // ── 상수 ──────────────────────────────────────────
  const GORILLA_HOME_X = 120;   // 홈 포지션 (px from left)
  const GORILLA_HOME_Y_RATIO = 0.75; // 화면 세로 비율
  const MAX_DRAG = 130;         // 최대 당기기 거리
  const LAUNCH_SPEED = 23.4;      // 발사 속도 (px/frame)
  const SPIN_SPEED = 22;        // 회전 속도 (deg/frame)

  let punchCount = 0;
  let homeX, homeY;
  let isDragging = false;
  let dragX, dragY;
  let isLaunched = false;
  let launchVX, launchVY;
  let gorillaPX, gorillaPY;
  let gorillaDeg = 0;
  let rafId = null;

  const scene    = document.getElementById('scene');
  const canvas   = document.getElementById('sling-canvas');
  const ctx      = canvas.getContext('2d');
  const goWrap   = document.getElementById('gorilla-wrap');
  const targetEl = document.getElementById('target-text');
  const targetZone = document.getElementById('target-zone');
  const overlayEl = document.getElementById('punch-overlay');
  const overlayTx = document.getElementById('punch-overlay-text');

  // ── 다이얼로그 ───────────────────────────────────
  document.getElementById('target-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startGame();
  });

  function startGame() {
    const val = document.getElementById('target-input').value.trim();
    if (!val) {
      document.getElementById('target-input').style.borderBottomColor = '#ffffff';
      document.getElementById('target-input').placeholder = '대상을 입력하세요!';
      setTimeout(() => { document.getElementById('target-input').style.borderBottomColor = ''; }, 600);
      return;
    }
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('page-wrap').style.display = 'block';
    document.getElementById('scene').style.display = 'block';
    document.getElementById('reset-btn').style.display = 'block';
    targetEl.textContent = val;
    initScene();
  }

  function resetGame() {
    cancelAnimationFrame(rafId);
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('page-wrap').style.display = 'none';
    document.getElementById('scene').style.display = 'none';
    document.getElementById('target-input').value = '';
    document.getElementById('count').textContent = '0';
    punchCount = 0; isDragging = false; isLaunched = false;
  }

  // ── 씬 초기화 ─────────────────────────────────────
  function initScene() {
    resizeCanvas();
    window.addEventListener('resize', () => {
      resizeCanvas();
      homeX = scene.offsetWidth / 2;
      homeY = scene.offsetHeight * 0.85;
      if (!isLaunched) placeGorilla(homeX, homeY);
    });

    homeX = scene.offsetWidth / 2;
    homeY = scene.offsetHeight * 0.85;
    placeGorilla(homeX, homeY);
    goWrap.innerHTML = gorillasSVG();

    // 이벤트
    goWrap.addEventListener('mousedown',  onDragStart);
    goWrap.addEventListener('touchstart', onDragStart, { passive: false });
    window.addEventListener('mousemove',  onDragMove);
    window.addEventListener('touchmove',  onDragMove, { passive: false });
    window.addEventListener('mouseup',    onDragEnd);
    window.addEventListener('touchend',   onDragEnd);

    rafId = requestAnimationFrame(loop);
  }

  function resizeCanvas() {
    canvas.width  = scene.offsetWidth;
    canvas.height = scene.offsetHeight;
  }

  function placeGorilla(x, y) {
    goWrap.style.left = (x - 180) + 'px';
    goWrap.style.top  = (y - 180) + 'px';
    gorillaPX = x; gorillaPY = y;
  }

  // ── 드래그 ────────────────────────────────────────
  function getPointer(e) {
    if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDragStart(e) {
    if (isLaunched) return;
    e.preventDefault();
    isDragging = true;
    goWrap.classList.add('dragging');
    const p = getPointer(e);
    dragX = p.x; dragY = p.y;
  }

  function onDragMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const p = getPointer(e);
    let dx = p.x - homeX;
    let dy = p.y - homeY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > MAX_DRAG) {
      dx = dx / dist * MAX_DRAG;
      dy = dy / dist * MAX_DRAG;
    }
    placeGorilla(homeX + dx, homeY + dy);
    dragX = homeX + dx; dragY = homeY + dy;
  }

  function onDragEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    goWrap.classList.remove('dragging');

    const dx = gorillaPX - homeX;
    const dy = gorillaPY - homeY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 10) { placeGorilla(homeX, homeY); return; } // 너무 짧으면 무시

    // 발사 방향: 당긴 반대
    const norm = dist || 1;
    launchVX = (-dx / norm) * LAUNCH_SPEED;
    launchVY = (-dy / norm) * LAUNCH_SPEED;
    // 3초 오버레이 표시 후 발사
    const targetVal = targetEl.textContent;
    overlayTx.innerHTML = `아이펀치라이크킹콩투<span class="target-name">${targetVal}</span>`;
    overlayEl.classList.remove('show');
    void overlayEl.offsetWidth;
    overlayEl.classList.add('show');

    setTimeout(() => {
      overlayEl.classList.remove('show');

      isLaunched = true;
      gorillaDeg = 0;
      gorilla_passed = false;
      whirlFrame = 0;
      bounceCount = 0;
      punchCount++;
      document.getElementById('count').textContent = punchCount;
      goWrap.classList.add('launched');
    }, 1000);
  }

  // ── 메인 루프 ─────────────────────────────────────
  let whirlFrame = 0;
  let bounceCount = 0;
  const MAX_BOUNCE = 5;

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (isDragging || (!isLaunched && (gorillaPX !== homeX || gorillaPY !== homeY))) {
      drawSling();
    }

    if (isLaunched) {
      gorillaPX += launchVX;
      gorillaPY += launchVY;
      gorillaDeg += SPIN_SPEED;
      whirlFrame += 0.4;

      // 회오리 transform
      const scaleX = 1 + Math.sin(whirlFrame * 1.7) * 0.45;
      const scaleY = 1 + Math.cos(whirlFrame * 1.3) * 0.35;
      const skewY  = Math.sin(whirlFrame * 2.1) * 18;
      const skewX  = Math.cos(whirlFrame * 1.9) * 14;
      goWrap.style.left = (gorillaPX - 180) + 'px';
      goWrap.style.top  = (gorillaPY - 180) + 'px';
      goWrap.style.transform = `rotate(${gorillaDeg}deg) scaleX(${scaleX}) scaleY(${scaleY}) skewY(${skewY}deg) skewX(${skewX}deg)`;

      // 타겟 존 충돌 (padding 36px 포함 영역)
      const zoneEl = document.getElementById('target-zone');
      const zRect  = zoneEl.getBoundingClientRect();
      const sRect  = scene.getBoundingClientRect();
      const zLeft  = zRect.left - sRect.left;
      const zTop   = zRect.top  - sRect.top;
      const zRight = zLeft + zRect.width;
      const zBot   = zTop  + zRect.height;
      const tCX    = zLeft + zRect.width  / 2;
      const tCY    = zTop  + zRect.height / 2;

      const inZone = gorillaPX > zLeft && gorillaPX < zRight &&
                     gorillaPY > zTop  && gorillaPY < zBot;

      if (inZone && !gorilla_passed) {
        gorilla_passed = true;
        zoneEl.classList.remove('shake');
        void zoneEl.offsetWidth;
        zoneEl.classList.add('shake');
        spawnShockwave(tCX, tCY);
        spawnImpactText(tCX, tCY);
        spawnParticles(tCX, tCY);
      }

      // 존에서 충분히 멀어지면 플래그 리셋
      const distToZone = Math.sqrt((gorillaPX - tCX)**2 + (gorillaPY - tCY)**2);
      if (gorilla_passed && distToZone > 220) {
        gorilla_passed = false;
      }

      // ── 벽 바운스 ──
      const W = scene.offsetWidth;
      const H = scene.offsetHeight;
      const margin = 60;

      let bounced = false;

      if (gorillaPX < margin) {
        gorillaPX = margin;
        launchVX = Math.abs(launchVX);
        bounced = true;
      } else if (gorillaPX > W - margin) {
        gorillaPX = W - margin;
        launchVX = -Math.abs(launchVX);
        bounced = true;
      }

      if (gorillaPY < margin) {
        gorillaPY = margin;
        launchVY = Math.abs(launchVY);
        bounced = true;
      } else if (gorillaPY > H - margin) {
        gorillaPY = H - margin;
        launchVY = -Math.abs(launchVY);
        bounced = true;
      }

      if (bounced) {
        bounceCount++;
        if (bounceCount >= MAX_BOUNCE) {
          returnGorilla();
          return;
        }
      }
    }

    rafId = requestAnimationFrame(loop);
  }

  // ── 새총 줄 그리기 ────────────────────────────────
  function drawSling() {
    const ax = homeX - 18;
    const bx = homeX + 18;
    const ay = homeY - 10;
    const by = homeY - 10;

    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);

    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(gorillaPX, gorillaPY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(gorillaPX, gorillaPY); ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(ax, ay, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx, by, 4, 0, Math.PI*2); ctx.fill();
  }

  // ── 충돌 플래그 ───────────────────────────────────
  let gorilla_passed = false;

  function returnGorilla() {
    isLaunched = false;
    gorilla_passed = false;
    whirlFrame = 0;
    bounceCount = 0;
    cancelAnimationFrame(rafId);
    goWrap.classList.remove('launched');
    goWrap.style.transform = '';

    homeX = scene.offsetWidth / 2;
    homeY = scene.offsetHeight * 0.85;

    const startX = gorillaPX, startY = gorillaPY;
    const dur = 600;
    const t0 = performance.now();

    function animReturn(now) {
      const t = Math.min((now - t0) / dur, 1);
      const ease = 1 - Math.pow(1 - t, 4);
      placeGorilla(
        startX + (homeX - startX) * ease,
        startY + (homeY - startY) * ease
      );
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (t < 1) {
        requestAnimationFrame(animReturn);
      } else {
        placeGorilla(homeX, homeY);
        goWrap.style.transform = '';
        goWrap.innerHTML = gorillasSVG();
        rafId = requestAnimationFrame(loop);
      }
    }
    requestAnimationFrame(animReturn);
  }

  // ── 이펙트 ────────────────────────────────────────
  function spawnImpactShape(cx, cy) {
    // 매번 랜덤하게 다른 폭발 도형 선택
    const type = Math.floor(Math.random() * 5);
    const size = 100 + Math.random() * 80;
    const rotStart = (Math.random() - 0.5) * 40;
    const rotMid   = rotStart + (Math.random() - 0.5) * 30;
    const rotEnd   = rotMid + (Math.random() - 0.5) * 20;
    const offsetX  = (Math.random() - 0.5) * 80;
    const offsetY  = (Math.random() - 0.5) * 60;

    const el = document.createElement('div');
    el.className = 'impact-shape';
    el.style.left = (cx + offsetX) + 'px';
    el.style.top  = (cy + offsetY) + 'px';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.setProperty('--rot-start', rotStart + 'deg');
    el.style.setProperty('--rot-mid',   rotMid   + 'deg');
    el.style.setProperty('--rot-end',   rotEnd   + 'deg');
    el.style.animationDuration = (0.5 + Math.random() * 0.25) + 's';

    el.innerHTML = makeImpactSVG(type, size);
    scene.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }

  function makeImpactSVG(type, size) {
    const s = size;
    const cx = s / 2, cy = s / 2;

    // 뾰족 별 path 생성
    function starPath(cx, cy, outerR, innerR, points, offset = 0) {
      let d = '';
      for (let i = 0; i < points * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (Math.PI / points) * i + offset;
        const x = cx + r * Math.cos(angle - Math.PI / 2);
        const y = cy + r * Math.sin(angle - Math.PI / 2);
        d += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2);
      }
      return d + 'Z';
    }

    // 지그재그 폭발 외곽선
    function burstPath(cx, cy, outerR, innerR, spikes) {
      return starPath(cx, cy, outerR, innerR, spikes);
    }

    const fills  = ['#AC2121', '#AC2121', '#AC2121', '#AC2121', '#AC2121'];
    const strokes = ['#ffffff', '#ffffff', '#ffffff'];
    const fill   = '#AC2121';
    const stroke = '#ffffff';

    if (type === 0) {
      // 8각 폭발 별
      const d = burstPath(cx, cy, s * 0.48, s * 0.22, 8);
      return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
        <path d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
        <text x="${cx}" y="${cy + s*0.06}" text-anchor="middle" dominant-baseline="middle"
          font-family="Black Han Sans,sans-serif" font-size="${s*0.28}px" fill="#fff">쾅</text>
      </svg>`;
    } else if (type === 1) {
      // 12각 뾰족 별 + !
      const d = burstPath(cx, cy, s * 0.48, s * 0.28, 12);
      return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
        <path d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/>
        <text x="${cx}" y="${cy + s*0.07}" text-anchor="middle" dominant-baseline="middle"
          font-family="Black Han Sans,sans-serif" font-size="${s*0.36}px" fill="#fff">!</text>
      </svg>`;
    } else if (type === 2) {
      // 찌그러진 원형 폭발 + ★
      const d = burstPath(cx, cy, s * 0.46, s * 0.32, 6);
      const starD = starPath(cx, cy - s*0.04, s*0.14, s*0.06, 5);
      return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
        <path d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
        <path d="${starD}" fill="#fff"/>
        <text x="${cx}" y="${cy + s*0.2}" text-anchor="middle" dominant-baseline="middle"
          font-family="Black Han Sans,sans-serif" font-size="${s*0.22}px" fill="#fff">퍽</text>
      </svg>`;
    } else if (type === 3) {
      // 사각 다이아몬드형 폭발
      const d = burstPath(cx, cy, s * 0.47, s * 0.24, 4, Math.PI / 4);
      return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
        <path d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="3"/>
        <text x="${cx}" y="${cy + s*0.06}" text-anchor="middle" dominant-baseline="middle"
          font-family="Black Han Sans,sans-serif" font-size="${s*0.26}px" fill="#fff">!!!</text>
      </svg>`;
    } else {
      // 10각 큰 별 + ※
      const d = burstPath(cx, cy, s * 0.48, s * 0.2, 10);
      return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
        <path d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
        <text x="${cx}" y="${cy + s*0.06}" text-anchor="middle" dominant-baseline="middle"
          font-family="Black Han Sans,sans-serif" font-size="${s*0.3}px" fill="#fff">★</text>
      </svg>`;
    }
  }

  function spawnShockwave(cx, cy) {
    for (let i = 0; i < 3; i++) {
      const sw = document.createElement('div');
      sw.className = 'shockwave';
      sw.style.left = cx + 'px'; sw.style.top = cy + 'px';
      sw.style.animationDelay = (i * 0.12) + 's';
      scene.appendChild(sw);
      setTimeout(() => sw.remove(), 900);
    }
  }

  function spawnImpactText(cx, cy) {
    // 도형 2~3개 동시에 터뜨리기
    const count = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      setTimeout(() => spawnImpactShape(cx, cy), i * 60);
    }
  }

  function spawnParticles(cx, cy) {
    const colors = ['#AC2121','#ffffff','#AC2121','#ffffff','#ffffff'];
    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.width = p.style.height = (4 + Math.random() * 6) + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      const angle = Math.random() * Math.PI * 2;
      const dist  = 80 + Math.random() * 140;
      p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      p.style.animation = `particleAnim ${0.5 + Math.random() * 0.4}s ease-out forwards`;
      scene.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }
  }
